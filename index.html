<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alger Music Player - Web</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    #app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(90deg, #e91e63, #9c27b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .api-selector {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .api-selector select, .api-selector input {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 14px;
    }
    .api-selector select {
      cursor: pointer;
    }
    .api-selector input {
      width: 250px;
    }
    .api-selector button {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, #e91e63, #9c27b0);
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .api-selector button:hover {
      transform: scale(1.05);
    }
    .search-box {
      display: flex;
      gap: 10px;
      margin: 20px 0;
    }
    .search-box input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 25px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 16px;
    }
    .search-box input::placeholder {
      color: rgba(255,255,255,0.5);
    }
    .search-box button {
      padding: 12px 30px;
      border-radius: 25px;
      border: none;
      background: linear-gradient(90deg, #e91e63, #9c27b0);
      color: #fff;
      cursor: pointer;
      font-size: 16px;
    }
    .results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .song-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .song-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-5px);
    }
    .song-card img {
      width: 100%;
      border-radius: 8px;
      aspect-ratio: 1;
      object-fit: cover;
    }
    .song-info {
      margin-top: 10px;
    }
    .song-title {
      font-size: 16px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-artist {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-top: 5px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.6);
    }
    .error {
      text-align: center;
      padding: 20px;
      background: rgba(244,67,54,0.2);
      border-radius: 8px;
      color: #f44336;
    }
    .section-title {
      font-size: 20px;
      font-weight: bold;
      margin: 30px 0 15px;
    }
    .quick-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .quick-link {
      padding: 8px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: all 0.3s;
    }
    .quick-link:hover {
      background: linear-gradient(90deg, #e91e63, #9c27b0);
    }
    .api-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }
    .status-dot.error {
      background: #f44336;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">🎵 Alger Music</div>
      <div class="api-selector">
        <span style="font-size: 14px;">API:</span>
        <select v-model="selectedApi" @change="changeApi">
          <option value="custom">自定义</option>
          <option value="worker">Cloudflare Worker (本地)</option>
          <option value="public1">公益API 1</option>
          <option value="public2">公益API 2</option>
          <option value="public3">公益API 3</option>
        </select>
        <input 
          v-if="selectedApi === 'custom'" 
          v-model="customApiUrl" 
          placeholder="输入自定义API地址"
          @keyup.enter="applyCustomApi"
        >
        <button @click="applyCustomApi">应用</button>
        <div class="api-status">
          <span class="status-dot" :class="{ error: apiError }"></span>
          <span>{{ apiStatus }}</span>
        </div>
      </div>
    </div>
    
    <div class="search-box">
      <input 
        v-model="keyword" 
        placeholder="搜索歌曲、歌手、专辑..." 
        @keyup.enter="search"
      >
      <button @click="search">搜索</button>
    </div>
    
    <div class="quick-links">
      <div class="quick-link" @click="getRecommend">每日推荐</div>
      <div class="quick-link" @click="getToplist">热门榜单</div>
    </div>
    
    <div v-if="loading" class="loading">加载中...</div>
    <div v-else-if="error" class="error">{{ error }}</div>
    
    <div v-if="results.length > 0">
      <div class="section-title">搜索结果</div>
      <div class="results">
        <div 
          v-for="song in results" 
          :key="song.id" 
          class="song-card"
          @click="playSong(song)"
        >
          <img :src="song.picUrl || song.albumPic || 'https://via.placeholder.com/300'" :alt="song.name">
          <div class="song-info">
            <div class="song-title">{{ song.name }}</div>
            <div class="song-artist">{{ song.artist }}</div>
          </div>
        </div>
      </div>
    </div>
    
    <div id="player"></div>
  </div>
  
  <script>
    const { createApp, ref, computed } = Vue;
    
    const PUBLIC_APIS = {
      public1: 'https://api.xingzhige.com/API/NetEase_CloudMusic_new/',
      public2: 'https://netease-api-8F8E.onrender.com/',
      public3: 'https://music-api-j2dp.vercel.app/',
    };
    
    createApp({
      setup() {
        const apiBase = ref(localStorage.getItem('alger_api_base') || '');
        const selectedApi = ref(localStorage.getItem('alger_api_type') || 'worker');
        const customApiUrl = ref('');
        const keyword = ref('');
        const results = ref([]);
        const loading = ref(false);
        const error = ref('');
        const apiStatus = ref('未测试');
        const apiError = ref(false);
        
        let ap = null;
        
        const getApiUrl = () => {
          if (selectedApi.value === 'custom' && customApiUrl.value) {
            return customApiUrl.value.replace(/\/$/, '');
          }
          if (selectedApi.value === 'worker') {
            return apiBase.value || '/api';
          }
          return PUBLIC_APIS[selectedApi.value] || '/api';
        };
        
        const changeApi = () => {
          localStorage.setItem('alger_api_type', selectedApi.value);
          if (selectedApi.value !== 'custom') {
            customApiUrl.value = '';
          }
        };
        
        const applyCustomApi = async () => {
          if (selectedApi.value === 'custom' && customApiUrl.value) {
            localStorage.setItem('alger_api_base', customApiUrl.value);
            localStorage.setItem('alger_api_type', 'custom');
          }
          await testApi();
        };
        
        const testApi = async () => {
          const url = getApiUrl();
          try {
            const response = await fetch(`${url}/search?keywords=test&type=song`);
            if (response.ok) {
              apiStatus.value = '正常';
              apiError.value = false;
            } else {
              apiStatus.value = '错误';
              apiError.value = true;
            }
          } catch (e) {
            apiStatus.value = '连接失败';
            apiError.value = true;
          }
        };
        
        const search = async () => {
          if (!keyword.value.trim()) return;
          loading.value = true;
          error.value = '';
          
          const url = getApiUrl();
          try {
            const response = await fetch(`${url}/search?keywords=${encodeURIComponent(keyword.value)}&type=1&limit=30`);
            const data = await response.json();
            
            if (data.code === 200 && data.result && data.result.songs) {
              results.value = data.result.songs.map(song => ({
                id: song.id,
                name: song.name,
                artist: song.artists.map(a => a.name).join(' / '),
                album: song.album.name,
                albumId: song.album.id,
                duration: song.duration,
                picUrl: song.album.picUrl,
                mv: song.mv,
              }));
            } else if (Array.isArray(data)) {
              results.value = data;
            } else {
              results.value = [];
              error.value = '未找到相关歌曲';
            }
          } catch (e) {
            error.value = '请求失败: ' + e.message;
            results.value = [];
          } finally {
            loading.value = false;
          }
        };
        
        const getRecommend = async () => {
          loading.value = true;
          error.value = '';
          
          const url = getApiUrl();
          try {
            const response = await fetch(`${url}/recommend`);
            const data = await response.json();
            
            if (Array.isArray(data)) {
              results.value = data;
            } else if (data.code === 200 && data.recommend) {
              results.value = data.recommend;
            } else {
              error.value = '获取推荐失败';
            }
          } catch (e) {
            error.value = '请求失败: ' + e.message;
          } finally {
            loading.value = false;
          }
        };
        
        const getToplist = async () => {
          loading.value = true;
          error.value = '';
          
          const url = getApiUrl();
          try {
            const response = await fetch(`${url}/toplist`);
            const data = await response.json();
            
            if (data.code === 200 && data.list) {
              const topList = data.list.slice(0, 3);
              const songs = [];
              for (const item of topList) {
                const playlistRes = await fetch(`${url}/playlist?id=${item.id}`);
                const playlistData = await playlistRes.json();
                if (playlistData.playlist && playlistData.playlist.tracks) {
                  songs.push(...playlistData.playlist.tracks.slice(0, 10).map(song => ({
                    id: song.id,
                    name: song.name,
                    artist: song.ar.map(a => a.name).join(' / '),
                    album: song.al.name,
                    picUrl: song.al.picUrl,
                    duration: song.dt,
                  })));
                }
              }
              results.value = songs;
            } else {
              error.value = '获取榜单失败';
            }
          } catch (e) {
            error.value = '请求失败: ' + e.message;
          } finally {
            loading.value = false;
          }
        };
        
        const playSong = async (song) => {
          loading.value = true;
          
          const url = getApiUrl();
          try {
            const response = await fetch(`${url}/song?id=${song.id}`);
            const data = await response.json();
            
            let songs = [];
            if (Array.isArray(data)) {
              songs = data;
            } else if (data.songs) {
              songs = data.songs;
            }
            
            const songData = songs[0] || song;
            
            if (!ap) {
              ap = new APlayer({
                container: document.getElementById('player'),
                fixed: true,
                autoplay: true,
                theme: '#e91e63',
                loop: 'all',
                preload: 'auto',
                volume: 0.7,
                mutex: true,
                listFolded: true,
                audio: [{
                  name: songData.name || song.name,
                  artist: songData.artist || song.artist,
                  url: songData.url || '',
                  cover: songData.pic || song.picUrl || song.albumPic,
                  lrc: '',
                }],
              });
            } else {
              ap.list.clear();
              ap.list.add({
                name: songData.name || song.name,
                artist: songData.artist || song.artist,
                url: songData.url || '',
                cover: songData.pic || song.picUrl || song.albumPic,
                lrc: '',
              });
              ap.play();
            }
          } catch (e) {
            error.value = '播放失败: ' + e.message;
          } finally {
            loading.value = false;
          }
        };
        
        // Initialize
        testApi();
        
        return {
          apiBase,
          selectedApi,
          customApiUrl,
          keyword,
          results,
          loading,
          error,
          apiStatus,
          apiError,
          changeApi,
          applyCustomApi,
          search,
          getRecommend,
          getToplist,
          playSong,
        };
      },
    }).mount('#app');
  </script>
</body>
</html>
