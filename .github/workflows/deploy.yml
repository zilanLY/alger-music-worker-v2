name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Wrangler
        run: npm install -g wrangler
      
      - name: Configure Cloudflare
        run: |
          echo "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> .env
          echo "CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}" >> .env
          echo "CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}" >> .env
      
      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NETEASE_COOKIE: ${{ secrets.NETEASE_COOKIE }}
          TENCENT_COOKIE: ${{ secrets.TENCENT_COOKIE }}