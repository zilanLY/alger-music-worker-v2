<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alger Music Web</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .header {
      text-align: center;
      padding: 40px 0;
    }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .header p { color: #888; }
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }
    .search-box input {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 16px;
    }
    .search-box input::placeholder { color: #666; }
    .search-box button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #e91e63;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    .search-box button:hover { background: #c2185b; }
    .playlist-section {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: #e91e63;
    }
    .song-list { list-style: none; }
    .song-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }
    .song-item:hover { background: rgba(255,255,255,0.1); }
    .song-item.playing { background: rgba(233,30,99,0.2); }
    .song-index { width: 30px; color: #666; }
    .song-info { flex: 1; }
    .song-name { font-size: 1rem; margin-bottom: 4px; }
    .song-artist { font-size: 0.85rem; color: #888; }
    .song-duration { color: #666; }
    .recommend-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tag {
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      cursor: pointer;
      transition: 0.2s;
    }
    .tag:hover { background: #e91e63; }
    #player { margin: 30px 0; }
    .loading { text-align: center; padding: 20px; color: #888; }
    .error { text-align: center; padding: 20px; color: #e91e63; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Alger Music Web</h1>
      <p>基于 Cloudflare Worker 的网易云音乐播放器</p>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索歌曲、歌手...">
      <button onclick="search()">搜索</button>
    </div>

    <div class="playlist-section">
      <div class="section-title">推荐歌单</div>
      <div class="recommend-tags">
        <div class="tag" onclick="getRecommend()">每日推荐</div>
        <div class="tag" onclick="getPlaylist(60198)">经典老歌</div>
        <div class="tag" onclick="getPlaylist(5273083763)">纯音乐</div>
        <div class="tag" onclick="getPlaylist(2829816513)">周杰伦</div>
      </div>
    </div>

    <div class="playlist-section" id="resultSection" style="display:none;">
      <div class="section-title" id="resultTitle">搜索结果</div>
      <ul class="song-list" id="songList"></ul>
    </div>

    <div id="player"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/meting@2/dist/Meting.min.js"></script>
  <script>
    const API_BASE = 'https://netease-cloud-music-api-five-roan-22.vercel.app';
    let ap = null;
    let currentList = [];

    function initPlayer() {
      ap = new APlayer({
        container: document.getElementById('player'),
        theme: '#e91e63',
        preload: 'auto',
        volume: 0.7,
        mutex: true,
        listFolded: false,
        listMaxHeight: 300,
      });
    }

    async function fetchAPI(url) {
      const res = await fetch(url);
      return await res.json();
    }

    async function search() {
      const keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) return;

      showResult('搜索结果');
      const data = await fetchAPI(`${API_BASE}/search?keywords=${encodeURIComponent(keyword)}`);
      if (data.code === 200 && data.result && data.result.songs) {
        renderSongs(data.result.songs);
      }
    }

    async function getRecommend() {
      showResult('每日推荐');
      const data = await fetchAPI(`${API_BASE}/recommend/songs`);
      if (data.code === 200 && data.recommend) {
        renderSongs(data.recommend);
      }
    }

    async function getPlaylist(id) {
      showResult('歌单详情');
      const data = await fetchAPI(`${API_BASE}/playlist/detail?id=${id}`);
      if (data.code === 200 && data.playlist && data.playlist.tracks) {
        renderSongs(data.playlist.tracks.slice(0, 50));
      }
    }

    function showResult(title) {
      document.getElementById('resultSection').style.display = 'block';
      document.getElementById('resultTitle').textContent = title;
    }

    function renderSongs(songs) {
      const list = document.getElementById('songList');
      list.innerHTML = '';
      currentList = songs;

      songs.forEach((song, index) => {
        const li = document.createElement('li');
        li.className = 'song-item';
        li.innerHTML = `
          <span class="song-index">${index + 1}</span>
          <div class="song-info">
            <div class="song-name">${song.name}</div>
            <div class="song-artist">${song.artists ? song.artists.map(a => a.name).join('/') : '未知'}</div>
          </div>
        `;
        li.onclick = () => playSong(song);
        list.appendChild(li);
      });
    }

    async function playSong(song) {
      document.querySelectorAll('.song-item').forEach(item => item.classList.remove('playing'));

      const urlData = await fetchAPI(`${API_BASE}/song/url?id=${song.id}`);
      let url = '';
      if (urlData.code === 200 && urlData.data) {
        const best = urlData.data.find(s => s.url) || urlData.data[0];
        url = best ? best.url : '';
      }

      if (!url) {
        alert('无法播放该歌曲');
        return;
      }

      const pic = song.al ? song.al.picUrl : song.album && song.album.picUrl || '';
      const artist = song.artists ? song.artists.map(a => a.name).join('/') : '未知';

      if (!ap) initPlayer();

      ap.destroy().then(() => {
        ap = new APlayer({
          container: document.getElementById('player'),
          theme: '#e91e63',
          preload: 'auto',
          volume: 0.7,
          mutex: true,
          listFolded: false,
          listMaxHeight: 300,
          audio: [{
            name: song.name,
            artist: artist,
            url: url,
            cover: pic,
          }],
        });
      });
    }

    initPlayer();
  </script>
</body>
</html>
